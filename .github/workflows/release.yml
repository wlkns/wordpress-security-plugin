name: Release

# Fires when `npm version` pushes a vX.Y.Z tag (via the postversion hook).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so git-cliff can read the commit range

      - name: Build plugin zip
        run: bash scripts/build-zip.sh

      - name: Generate release notes from commits since the previous release
        id: notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "$GITHUB_REF_NAME" dist/wlkns-security.zip \
              --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
          else
            # No commits in range — let GitHub auto-generate notes.
            gh release create "$GITHUB_REF_NAME" dist/wlkns-security.zip \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
