# git-cliff configuration — https://git-cliff.org
#
# Generates the changelog / release notes from the commit messages in the range
# since the previous release tag. Every commit in the range is included: typed
# Conventional Commits (feat:, fix:, …) are grouped under headings, and anything
# else falls through to "Other" so nothing is silently dropped.

[changelog]
# Rendered once at the top of CHANGELOG.md (and stripped from release bodies).
header = """
# Changelog

All notable changes to this project are documented here.
This file is generated from commit messages by [git-cliff](https://git-cliff.org).

"""

# One block per release version.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

trim = true
footer = ""

[git]
conventional_commits = true
# Keep non-conventional commits too (they route to "Other" via the catch-all parser).
filter_unconventional = false
filter_commits = false
protect_breaking_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

# Ordered: first match wins. Skips run first, then typed groups, then catch-all.
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^Merge ", skip = true },
  # Old-style npm version bump commits (e.g. "1.0.1") before the chore(release) convention.
  { message = "^\\d+\\.\\d+\\.\\d+", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Changed" },
  { message = "^test", group = "Tests" },
  { message = "^ci|^build", group = "Build & CI" },
  { message = "^chore", group = "Chores" },
  # Catch-all: everything else still appears.
  { message = ".*", group = "Other" },
]
